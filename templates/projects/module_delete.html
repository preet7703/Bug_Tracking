{% extends 'core/base.html' %}
{% block title %}Delete Module{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <div class="page-title">Delete Module</div>
        <div class="breadcrumb"><span>Dashboard</span> / <span>Modules</span> / Delete</div>
    </div>
</div>

<div class="form-card">
    <div class="form-title">⚠️ Confirm Delete</div>
    <p>Are you sure you want to delete module <strong>{{ module.name }}</strong>?</p>
    <br>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'module_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
