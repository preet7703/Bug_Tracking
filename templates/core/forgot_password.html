<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Bug Tracking System</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <div class="login-logo">
            <div class="logo-box">🐛</div>
            <h2>Reset Password</h2>
            <p>Enter your email and new password</p>
        </div>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'forgot_password' %}">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="id_email">Email Address</label>
                <input
                    type="email"
                    id="id_email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password1">New Password</label>
                <input
                    type="password"
                    id="id_password1"
                    name="password1"
                    class="form-control"
                    placeholder="Enter new password"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password2">Confirm Password</label>
                <input
                    type="password"
                    id="id_password2"
                    name="password2"
                    class="form-control"
                    placeholder="Confirm new password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem; font-size:0.95rem; margin-top:0.5rem;">
                Reset Password
            </button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.85rem; color:#888;">
            Remember your password?
            <a href="{% url 'login' %}" style="color:#4361ee; font-weight:600;">
                Sign In
            </a>
        </p>

    </div>
</div>

<footer class="footer">
    &copy; 2026 <span>Bug Tracking System</span> &mdash; All rights reserved.
</footer>

</body>
</html>
